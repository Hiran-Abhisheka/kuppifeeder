name: kuppifeed

description: A modern, modular Flutter front-end for KuppiFeed.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.1.0

  image_picker: ^1.0.0
  bcrypt: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.png
    - .env
